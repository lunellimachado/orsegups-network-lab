<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ORSEGUPS Network Lab</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:40px;
        }

        .container{
            max-width:800px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
        }

        h1{
            color:#003366;
        }

        h2{
            color:#003366;
            margin-top:30px;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:5px;
            background:#0066cc;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#004c99;
        }

        .secao{
            margin-top:30px;
            padding-top:20px;
            border-top:1px solid #ddd;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>ORSEGUPS Network Lab</h1>

    <p>Automação de Configuração Cisco</p>

    <form method="POST" action="/aplicar">

        <h2>Configuração do Switch</h2>

        <label>Hostname</label>
        <input name="hostname" type="text" placeholder="SW-ORSEGUPS-01">

        <label>VLAN 10 - Usuários</label>
        <input name="vlan10" type="text" placeholder="10">

        <label>VLAN 20 - Telefonia</label>
        <input name="vlan20" type="text" placeholder="20">

        <label>VLAN 50 - Visitantes</label>
        <input name="vlan50" type="text" placeholder="50">


        <div class="secao">

            <h2>Conexão SSH</h2>

            <label>IP do Switch</label>
            <input name="ip_switch" type="text" placeholder="192.168.1.10">

            <label>Usuário</label>
            <input name="usuario" type="text" placeholder="admin">

            <label>Senha</label>
            <input name="senha" type="password" placeholder="********">

        </div>


        <button type="submit">
            Aplicar Configuração
        </button>

        <button formaction="/download" formmethod="POST">
            Baixar Configuração
        </button>

    </form>

</div>

</body>
</html>
